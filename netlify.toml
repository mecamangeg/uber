# Netlify Build Configuration for Ryde (Angular)
# Auto-deploys on push to `main`.

[build]
  command = "npm install && npx ng build --configuration production"
  publish = "dist/uber-angular/browser"

# SPA routing — redirect all paths to index.html for Angular Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively (Angular hashes filenames)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images cached for 1 week
[[headers]]
  for = "/*.@(jpg|jpeg|gif|png|svg|webp|ico)"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://maps.googleapis.com https://*.clerk.accounts.dev https://*.clerk.dev https://api.clerk.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.clerk.dev https://img.clerk.com https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://*.clerk.accounts.dev https://*.clerk.dev https://api.clerk.com https://*.googleapis.com https://*.gstatic.com https://maps.geoapify.com https://*.run.app; frame-src https://*.clerk.accounts.dev https://challenges.cloudflare.com; worker-src 'self' blob:;"
