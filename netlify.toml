# Netlify Build Configuration for Ryde (Angular)
# Auto-deploys on push to `main`.

[build]
  command = "npm install && npx ng build --configuration production"
  publish = "dist/uber-angular/browser"

# SPA routing — redirect all paths to index.html for Angular Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively (Angular hashes filenames)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images cached for 1 week
[[headers]]
  for = "/*.@(jpg|jpeg|gif|png|svg|webp|ico)"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(self)"
    # CSP disabled for dev/test — re-enable with proper Clerk/Cloudflare domains for production
    # Content-Security-Policy = "..."
